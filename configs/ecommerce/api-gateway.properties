server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.mvc.routes[0].id=product-service
spring.cloud.gateway.mvc.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/product/**

spring.cloud.gateway.mvc.routes[1].id=cart-service
spring.cloud.gateway.mvc.routes[1].uri=lb://CART-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/cart/**

spring.cloud.gateway.mvc.routes[2].id=checkout-service
spring.cloud.gateway.mvc.routes[2].uri=lb://CHECKOUT-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/checkout/**

spring.cloud.gateway.mvc.routes[3].id=order-service
spring.cloud.gateway.mvc.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/order/**
